<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildex</title>
<link rel="stylesheet" href="CSS/style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&family=Caveat&display=swap" rel="stylesheet">
</head>

<body>
  <header class="header">
    <div class="logo-section">
      <img class="logo" src="Images/Logot.png" alt="WILDEX logo">
      <span class="title">WildDex</span>
    </div>

    <nav class="navigation">
      <a href="index.html">Home</a>
      <a href="dexsiden.html">Dex</a>
      <a href="learnmore.html">Learn More</a>
      <a href="Progress.html">Progress</a>
    </nav>
  </header>
	
  <main class="learn-more-page">

    <section class="learn-hero">
      <p class="dex-eyebrow">WildDex Field Guide</p>
      <h1>Learn more about the animals you meet on your journey</h1>
      <p>
        Explore habitats, behaviour, diet, rarity and where each animal can be discovered.
      </p>
    </section>

    <section class="learn-controls">
      <input type="search" id="animal-search" placeholder="Search animal...">
      <button type="button" id="collapse-all">Close all</button>
    </section>

    <section class="learn-region-panel">
      <h2>Find animals by region</h2>
      <div id="learn-region-menu"></div>
    </section>

    <section class="field-guide-section">
      <div class="section-heading">
        <p class="dex-eyebrow">Field Guide</p>
        <h2>Animal database</h2>
      </div>

      <div id="field-guide-container"></div>
    </section>

  </main>
<script src="JS/animals.js"></script>
<script src="JS/function.js"></script>
</body>
</html>
